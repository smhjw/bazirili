<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>命运日历 | 免费分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner shell">
      <a class="logo" href="index.html"><span class="logo-mark">✣</span><span>命运日历</span></a>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="features.html">功能</a>
        <a href="about.html">关于</a>
        <a href="help.html">帮助</a>
        <a href="blog.html">博客</a>
      </nav>
      <div class="top-actions">
        <a class="btn btn-primary" href="analysis.html">进入应用</a>
        <button class="btn btn-ghost" type="button">登录</button>
        <button class="btn btn-ghost" type="button">中文</button>
      </div>
    </div>
  </header>

  <main class="analysis-dashboard shell">
    <aside class="dash-left">
      <section class="panel profile-card">
        <h3>个人档案</h3>
        <form id="profileForm">
          <label>姓名<input id="pName" type="text" value="张三" required /></label>
          <div class="date-row">
            <label>出生年<input id="pYear" type="text" inputmode="numeric" maxlength="4" placeholder="1995" required /></label>
            <label>月<input id="pMonth" type="text" inputmode="numeric" maxlength="2" placeholder="08" required /></label>
            <label>日<input id="pDay" type="text" inputmode="numeric" maxlength="2" placeholder="15" required /></label>
          </div>
          <label>出生时<input id="pTime" type="time" value="10:30" required /></label>
          <label>出生地
            <select id="pCity">
              <option>北京</option><option>上海</option><option>广州</option><option>深圳</option>
              <option>杭州</option><option>成都</option><option>武汉</option><option>西安</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">更新档案</button>
          <p id="dateError" class="field-error"></p>
        </form>
      </section>
      <section class="panel mini-calendar">
        <div class="cal-head"><b id="calMonthText"></b></div>
        <div id="calGrid" class="cal-grid"></div>
      </section>
    </aside>

    <section class="dash-main">
      <div class="dash-title-row">
        <h2 id="helloText">张三，今日如何？</h2>
        <div class="date-dot" id="todayDot"></div>
      </div>
      <div class="overview-strip" id="overviewStrip"></div>

      <article class="panel vibe-panel">
        <div class="vibe-head"><span>TODAY'S VIBE</span><b id="vibeScore">63</b></div>
        <h3 id="vibeTitle">稳刚</h3>
        <p id="vibeDesc">今日比拼耐心，节奏稳则输出更稳。</p>
        <div id="adviceBox" class="advice-box">今日宜“先对齐预期，再推进执行”。</div>
      </article>

      <article class="panel bazi-panel">
        <h3>八字详情</h3>
        <div class="pill-row" id="pillarRow"></div>
      </article>

      <article class="panel metrics-list" id="metricList"></article>
      <article class="panel activity-panel">
        <h3>分析日志</h3>
        <ul id="activityFeed" class="activity-feed"></ul>
      </article>
    </section>

    <aside class="dash-right">
      <section class="panel progress-card">
        <p>成就进度</p>
        <h3 id="progressText">0/12</h3>
      </section>
      <section class="panel tools-card">
        <h4>今日工具</h4>
        <div class="tool-tags">
          <button type="button" class="tool-chip" data-tool="checkin">每日签到</button>
          <button type="button" class="tool-chip" data-tool="trend">趋势分析</button>
          <button type="button" class="tool-chip" data-tool="history">历史记录</button>
          <button type="button" class="tool-chip" data-tool="classroom">八字学堂</button>
        </div>
      </section>
      <section class="panel tools-card">
        <h4>深度分析</h4>
        <button class="tool-btn" data-deep="ai">AI 命理咨询</button>
        <button class="tool-btn" data-deep="life">人生大问题</button>
        <button class="tool-btn" data-deep="date">择日</button>
        <button class="tool-btn" data-deep="tarot">塔罗</button>
      </section>
      <button class="btn big-cta" id="genReportBtn" type="button">生成日报</button>
    </aside>
  </main>
  <footer class="shell page-footer">© 2026 命运日历 · 免费核心功能，持续更新。</footer>

  <script src="analysis.js"></script>
</body>
</html>
